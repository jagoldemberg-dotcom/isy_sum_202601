spring.application.name=backend
server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mydatabase?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:myuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

server.error.include-message=never
server.error.include-binding-errors=never
app.jwt.secret=${APP_JWT_SECRET:SeguridadCalidadJWTSecretKey2026SeguridadCalidadJWT!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
