services:
  mysql-isy2202:
    image: mysql/mysql-server:8.0
    container_name: mysql-isy2202
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - ./sql/01_schema_and_data.sql:/docker-entrypoint-initdb.d/01_schema_and_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build: ./backend
    container_name: backend-isy2202
    ports:
      - "8081:8080"
    depends_on:
      mysql-isy2202:
        condition: service_healthy
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-isy2202:3306/mydatabase?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: password
      APP_JWT_SECRET: SeguridadCalidadJWTSecretKey2026SeguridadCalidadJWT!
      APP_PUBLIC_BASE_URL: http://localhost/recetas

  frontend:
    build: ./frontend
    container_name: frontend-isy2202
    ports:
      - "80:8080"
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
